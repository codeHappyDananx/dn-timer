name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, leave empty to use v0.1.<run number>"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri build

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "v0.1.${{ github.run_number }}"
            }
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "src-tauri/target/release/dn-timer.exe" "release-assets/DN Timer.exe" -Force

          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "release-assets/DN Timer Setup.exe" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dn-timer-windows
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DN Timer ${{ env.RELEASE_TAG }}
          body: |
            自动打包发布。

            下载 `DN Timer.exe` 可直接运行。
            下载 `DN Timer Setup.exe` 可安装使用。
          files: release-assets/*
