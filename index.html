<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绿龙计时器</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #151820;
        color: #f5f5f7;
        font-family:
          "Microsoft YaHei",
          "Segoe UI",
          sans-serif;
      }

      .startup-shell {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-sizing: border-box;
        user-select: none;
      }

      .startup-mark {
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #d4af37;
        color: #161616;
        font-size: 18px;
        font-weight: 800;
      }

      .startup-content {
        min-width: 0;
        flex: 1;
      }

      .startup-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 20px;
      }

      .startup-status {
        margin-top: 3px;
        font-size: 12px;
        color: rgba(245, 245, 247, 0.62);
      }

      .startup-bar {
        width: 100%;
        height: 3px;
        margin-top: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
      }

      .startup-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        background: #d4af37;
        animation: startup-loading 1.1s ease-in-out infinite;
      }

      @keyframes startup-loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
    <script type="module" src="/src/main.tsx" defer></script>
  </head>

  <body>
    <div id="root">
      <div class="startup-shell">
        <div class="startup-mark">龙</div>
        <div class="startup-content">
          <div class="startup-title">绿龙计时器</div>
          <div class="startup-status">正在启动...</div>
          <div class="startup-bar"></div>
        </div>
      </div>
    </div>
  </body>
</html>
